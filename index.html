<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Dashboard Admin</h1>
  <p>Selamat Datang, Ester Manalu</p>
</header>

<section class="cards">
  <div class="card">
    <h2>📦 Produk</h2>
    <p>120</p>
  </div>

  <div class="card">
    <h2>🛒 Pesanan</h2>
    <p>85</p>
  </div>

  <div class="card">
    <h2>👥 Pelanggan</h2>
    <p>54</p>
  </div>

  <div class="card">
    <h2>💰 Penjualan</h2>
    <p>Rp12.500.000</p>
  </div>
</section>

<section class="table">
  <h2>Daftar Produk</h2>

  <table>
    <tr>
      <th>No</th>
      <th>Produk</th>
      <th>Harga</th>
      <th>Stok</th>
      <th>Status</th>
    </tr>

    <tr>
      <td>1</td>
      <td>Sepatu</td>
      <td>Rp250.000</td>
      <td>20</td>
      <td>Aktif</td>
    </tr>

    <tr>
      <td>2</td>
      <td>Tas</td>
      <td>Rp150.000</td>
      <td>15</td>
      <td>Aktif</td>
    </tr>

    <tr>
      <td>3</td>
      <td>Jam Tangan</td>
      <td>Rp500.000</td>
      <td>8</td>
      <td>Aktif</td>
    </tr>
  </table>
</section>

<script src="script.js"></script>

</body>
</html>
